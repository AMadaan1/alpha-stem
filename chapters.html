<!-- Notice the 'no-tilt' class prevents the 3D glitching while typing -->
            <div class="card no-tilt">
                <h3 style="font-family: var(--font-heading); margin-bottom: 40px; color: var(--alpha-green); font-size: 2rem;">Initiation Sequence</h3>
                
                <form id="chapter-form" class="premium-form">
                    <div class="form-group">
                        <!-- required attribute is necessary for the CSS :valid pseudo-class to keep the label floating -->
                        <input type="text" id="appName" required>
                        <label>Operator Name</label>
                    </div>
                    <div class="form-group">
                        <input type="email" id="appEmail" required>
                        <label>Institution Email</label>
                    </div>
                    <div class="form-group">
                        <input type="text" id="appSchool" required>
                        <label>School / Node Location</label>
                    </div>
                    <div class="form-group">
                        <textarea id="appReason" rows="1" required></textarea>
                        <label>Why initialize an Alpha node?</label>
                    </div>
                    
                    <button type="submit" class="btn-magnetic" style="width: 100%; margin-top: 20px;">
                        Transmit Application
                    </button>
                </form>

            </div>
